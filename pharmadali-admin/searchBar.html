<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
        }

        .header-bar {
            background: #96D2EE;
            background: linear-gradient(90deg, rgba(150, 210, 238, 1) 0%, rgba(191, 225, 242, 1) 74%, rgba(255, 255, 255, 1) 100%);
        }

        .hamburger-line {
            display: block;
            height: 3px;
            background-color: white;
            border-radius: 2px;
        }

        .time-icon {
            font-size: 24px;
            color: #FFD700;
        }

        .time-icon.afternoon {
            color: #FFA500;
        }

        .time-icon.evening {
            color: #6B7280;
        }
    </style>
</head>

<body>
    <div class="d-flex align-items-center p-3 gap-3 header-bar">
        <div class="d-flex flex-column justify-content-between cursor-pointer" style="width: 30px; height: 24px;">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
        </div>

        <div class="flex-shrink-0">
            <img src="../pharmadali-mobile-app/assets/main_logo.svg" alt="PharmaDali"
                style="height: 30px; width: auto;">
        </div>

        <div class="flex-grow-1 mx-auto" style="max-width: 600px;">
            <input type="text" class="form-control rounded-3 shadow-sm" placeholder="Search for anything here.."
                style="padding: 12px 20px;">
        </div>

        <div class="d-flex align-items-center gap-3 ms-auto flex-shrink-0">
            <div class="d-flex align-items-center gap-2 fw-medium">
                <i class="fa-solid fa-sun time-icon"></i>
                <span class="greeting-text">Good Morning</span>
            </div>
            <div class="small">
                <div id="date">3 March 2026</div>
                <div id="time">22:45:04</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        function updateDateTime() {
            const now = new Date();

            const timeString = now.toLocaleTimeString('en-US', { hour12: false });
            document.getElementById('time').textContent = timeString;

            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            const dateString = now.toLocaleDateString('en-US', options);
            document.getElementById('date').textContent = dateString;
        }

        function updateGreetingAndIcon() {
            const now = new Date();
            const hour = now.getHours();
            const greetingText = document.querySelector('.greeting-text');
            const timeIcon = document.querySelector('.time-icon');

            timeIcon.classList.remove('afternoon', 'evening', 'fa-sun', 'fa-cloud-sun', 'fa-moon');

            if (hour < 12) {
                greetingText.textContent = 'Good Morning';
                timeIcon.classList.add('fa-sun');
            } else if (hour < 18) {
                greetingText.textContent = 'Good Afternoon';
                timeIcon.classList.add('fa-cloud-sun');
                timeIcon.classList.add('afternoon');
            } else {
                greetingText.textContent = 'Good Evening';
                timeIcon.classList.add('fa-moon');
                timeIcon.classList.add('evening');
            }
        }

        updateDateTime();
        updateGreetingAndIcon();

        setInterval(updateDateTime, 1000);

        setInterval(updateGreetingAndIcon, 60000);
    </script>
</body>

</html>

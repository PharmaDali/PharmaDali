<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
        }

        .header-bar {
            background: #96D2EE;
            background: linear-gradient(90deg, rgba(150, 210, 238, 1) 0%, rgba(191, 225, 242, 1) 74%, rgba(255, 255, 255, 1) 100%);
            position: sticky;
            top: 0;
            z-index: 1001;
        }

        .hamburger-line {
            display: block;
            height: 3px;
            background-color: white;
            border-radius: 2px;
        }

        .time-icon {
            font-size: 24px;
            color: #FFD700;
        }

        .time-icon.afternoon {
            color: #FFA500;
        }

        .time-icon.evening {
            color: #6B7280;
        }

        .hamburger-menu {
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .hamburger-menu:hover {
            transform: scale(1.1);
        }

        .sidebar {
            position: fixed;
            top: 78px;
            left: -350px;
            width: 350px;
            height: calc(100vh - 78px);
            background: #F5F5F5;
            box-shadow: 5px 4px 10px rgba(0, 0, 0, 0.1);
            transition: left 0.3s ease;
            z-index: 1000;
            padding: 0;
            overflow-y: auto;
            border-top: none;
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-header {
            background: linear-gradient(135deg, #96D2EE 0%, #BFE1F2 100%);
            padding: 20px 15px;
            position: relative;
        }

        .profile-img {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid white;
        }

        .profile-name {
            font-weight: 600;
            font-size: 16px;
            color: #333;
            margin: 0;
        }

        .pharmacy-name {
            font-size: 12px;
            color: #FF4242;
            margin: 0;
        }

        .sidebar-menu {
            padding: 0;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px 20px;
            color: #00A6ED;
            text-decoration: none;
            transition: all 0.2s ease;
            position: relative;
            font-size: 15px;
        }

        .menu-item:hover {
            background: rgba(0, 166, 237, 0.05);
        }

        .menu-item.active {
            background: #48AAD9;
            color: white;
        }

        .menu-item i {
            font-size: 18px;
            width: 20px;
            text-align: center;
        }

        .notification-badge {
            position: absolute;
            right: 20px;
            background: #FF4242;
            color: white;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .menu-dots {
            cursor: pointer;
            font-size: 20px;
            color: #333;
        }

        .menu-divider {
            height: 1px;
            background-color: #D0D0D0;
            margin: 10px 15px;
        }

        .sidebar-overlay {
            position: fixed;
            top: 78px;
            left: 0;
            width: 100%;
            height: calc(100% - 78px);
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            z-index: 999;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>

<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center gap-2">
                    <img src="https://ui-avatars.com/api/?name=Denmar&background=4A90E2&color=fff&size=45" alt="Profile"
                        class="profile-img">
                    <div>
                        <p class="profile-name">Denmar</p>
                        <p class="pharmacy-name">Laily's Pharmacy</p>
                    </div>
                </div>
                <i class="fa-solid fa-ellipsis-vertical menu-dots"></i>
            </div>
        </div>

        <nav class="sidebar-menu">
            <a href="#" class="menu-item">
                <i class="fa-solid fa-th-large"></i>
                <span>Dashboard</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fa-solid fa-store"></i>
                <span>POS</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fa-solid fa-chart-line"></i>
                <span>Pickup Orders</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fa-solid fa-boxes"></i>
                <span>Inventory</span>
            </a>
            <div class="menu-divider"></div>
            <a href="#" class="menu-item">
                <i class="fa-solid fa-brain"></i>
                <span>AI Forecasting</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fa-solid fa-chart-bar"></i>
                <span>Sales & Reports</span>
            </a>
            <div class="menu-divider"></div>
            <a href="#" class="menu-item">
                <i class="fa-solid fa-users"></i>
                <span>Users</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fa-solid fa-bell"></i>
                <span>Notifications</span>
                <span class="notification-badge">01</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fa-solid fa-cog"></i>
                <span>Settings</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fa-solid fa-question-circle"></i>
                <span>Get Technical Help</span>
            </a>
        </nav>
    </div>

    <div class="d-flex align-items-center p-3 gap-3 header-bar">
        <div class="d-flex flex-column justify-content-between hamburger-menu" style="width: 30px; height: 24px;"
            id="hamburgerMenu">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
        </div>

        <div class="flex-shrink-0">
            <img src="../pharmadali-mobile-app/assets/main_logo.svg" alt="PharmaDali"
                style="height: 30px; width: auto;">
        </div>

        <div class="d-flex align-items-center gap-3 ms-auto flex-shrink-0">
            <div class="d-flex align-items-center gap-2 fw-medium">
                <i class="fa-solid fa-sun time-icon"></i>
                <span class="greeting-text">Good Morning</span>
            </div>
            <div class="small">
                <div id="date">3 March 2026</div>
                <div id="time">22:45:04</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        function updateDateTime() {
            const now = new Date();

            const timeString = now.toLocaleTimeString('en-US', { hour12: false });
            document.getElementById('time').textContent = timeString;

            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            const dateString = now.toLocaleDateString('en-US', options);
            document.getElementById('date').textContent = dateString;
        }

        function updateGreetingAndIcon() {
            const now = new Date();
            const hour = now.getHours();
            const greetingText = document.querySelector('.greeting-text');
            const timeIcon = document.querySelector('.time-icon');

            timeIcon.classList.remove('afternoon', 'evening', 'fa-sun', 'fa-cloud-sun', 'fa-moon');

            if (hour < 12) {
                greetingText.textContent = 'Good Morning';
                timeIcon.classList.add('fa-sun');
            } else if (hour < 18) {
                greetingText.textContent = 'Good Afternoon';
                timeIcon.classList.add('fa-cloud-sun');
                timeIcon.classList.add('afternoon');
            } else {
                greetingText.textContent = 'Good Evening';
                timeIcon.classList.add('fa-moon');
                timeIcon.classList.add('evening');
            }
        }

        updateDateTime();
        updateGreetingAndIcon();

        setInterval(updateDateTime, 1000);

        setInterval(updateGreetingAndIcon, 60000);

        const hamburgerMenu = document.getElementById('hamburgerMenu');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        function toggleSidebar() {
            sidebar.classList.toggle('active');
            sidebarOverlay.classList.toggle('active');
        }

        hamburgerMenu.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);
    </script>
</body>

</html>
